approvedGitRepositories:
  - "**"

checksumBehavior: throw

enableGlobalCache: false

enableScripts: true

nodeLinker: node-modules

npmRegistryServer: "https://registry.npmjs.org"

# @cosmicdriftgamestudio/* sind PRIVATE GH-Packages (kumiko-guards usw.).
# Yarn-Berry routet scope→registry NUR über npmScopes hier — .npmrc-Format
# `@scope:registry=...` ist nicht ausreichend. Token wird zur Laufzeit aus
# GITHUB_TOKEN (CI) oder einem lokal-gesetzten env var expandiert; ohne
# Token bleibt das Feld leer und Yarn fällt nur bei tatsächlichem Fetch um.
npmScopes:
  cosmicdriftgamestudio:
    npmRegistryServer: "https://npm.pkg.github.com"
    npmAuthToken: "${GITHUB_TOKEN:-}"
