# Dedizierter Lauf für DOM/Render-Tests (*.test.tsx). Der Default-Unit-Lauf
# (bunfig.toml / bunfig.ci.toml) lädt happy-dom nicht mehr — node-only Tests
# bekommen kein fake-window mehr untergelegt (Issue #1330).
#
# Aufruf: bun test --config=bunfig.dom.toml .test.tsx
# (bun filtert positional args als Substring auf den Dateipfad.)
#
# concurrency=1: shared single-process happy-dom kollidiert unter
# Parallelität (RAM + React event delegation, #457).

[install]
linker = "hoisted"

[install.scopes]
"@cosmicdriftgamestudio" = { url = "https://npm.pkg.github.com", token = "$GITHUB_TOKEN" }

[test]
preload = ["./test-setup/base.preload.ts", "./test-setup/dom.preload.ts"]
concurrency = 1
timeout = 15000

# Coverage für den Badge-Merge — der dom-Lauf ist der EINZige, der die
# tsx-abgedeckten UI-Dateien (renderer-web, widgets, bundled-features web)
# ausführt; ohne dieses lcov fehlen sie im Badge (waren vor #1330 im
# unit-lcov enthalten). coverage-badge.ts merged coverage/dom als dritte
# Quelle neben unit+integration.
coverage = true
coverageReporter = ["lcov"]
coverageDir = "coverage/dom"
coveragePathIgnorePatterns = [
  "**/scripts/**",
  "**/bin/**",
  "**/test-setup/**",
  "**/tmp/**",
  "integration.guard.ts",
]

pathIgnorePatterns = [
  "**/e2e/**",
  "**/*.spec.ts",
  "**/*.spec.tsx",
  "**/dist/**",
  # #457: diese 2 Screen-Tests korruptieren im shared single-process happy-dom
  # (CI-only — lokal ist der volle tsx-Lauf grün). Sie laufen je in eigenem
  # `bun test`-Prozess via bunfig.ci-dom.toml (`bun run test:dom:isolated`).
  "**/user-data-rights/web/__tests__/deletion-screens.test.tsx",
  "**/user-data-rights/web/__tests__/privacy-center-screen.test.tsx",
]
