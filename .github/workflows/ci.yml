# CI für kumiko-framework. Pattern: test + auto-publish via Changesets.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Full check: yarn kumiko check ruft alle 19 Guards via bunx
    # (kumiko-guard-X bin-entries aus @cosmicdriftgamestudio/kumiko-guards).
    # Plus: KUMIKO_GUARD_ROOTS engt Cross-Repo-Scan auf framework-only ein
    # (in Standalone-CI gibt's keine Sibling-Repos).
    uses: cosmicdriftgamestudio/infra/.github/workflows/_test.yml@main
    with:
      test-command: "KUMIKO_GUARD_ROOTS=kumiko-framework yarn kumiko check"
      enable-gh-packages: true
    secrets: inherit

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    uses: cosmicdriftgamestudio/infra/.github/workflows/_npm-publish.yml@main
    secrets: inherit
