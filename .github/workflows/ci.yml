# CI für kumiko-framework. Inline-Jobs (kein Cross-Repo-Reusable mehr) —
# das verhindert dass infra public sein muss damit dieses public-Repo
# seine Workflows ausführen kann.

name: CI

# Husky-Hooks (pre-push etc.) gehören in CI nicht installiert: changesets/action
# pusht intern einen Versions-Branch, was sonst den pre-push-Hook + dessen
# `bun test` (mit DB-Bedarf) feuert und den Release-Job rot macht.
env:
  HUSKY: "0"

on:
  # No feature-branch push trigger: merging is PR-only, so the pull_request run
  # is the one that gates merge. A push trigger on feat/fix/... only duplicated
  # every run (same SHA fires push + pull_request:synchronize). Keep push for
  # main (post-merge CI + release) and the changesets bot's version branch.
  push:
    branches: [main, "changeset-release/**"]
  pull_request:
    branches: [main, "feat/**", "fix/**", "chore/**", "docs/**"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # GitHub-hosted: public repo → gratis + 4 Cores (statt 1-CPU cdgs-runner).
    # Kein Cluster-Zugriff nötig (pure typecheck/lint/test).
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Cache Bun
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Cache TS Build Info
        uses: actions/cache@v5
        with:
          path: |
            **/*.tsbuildinfo
            **/dist
          key: tsbuildinfo-${{ runner.os }}-${{ hashFiles('**/bun.lock', '**/tsconfig.json') }}
          restore-keys: |
            tsbuildinfo-${{ runner.os }}-

      - name: Install
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_PAT || secrets.GITHUB_TOKEN }}
        run: bun install --frozen-lockfile

      - name: View-logic guard (samples)
        # samples/apps müssen denselben No-Logic-in-Views-Guard bestehen wie
        # die App-Repos. Framework nutzt nicht _app-test → expliziter Step,
        # scoped auf den framework-Root. bin-existence-Check wie in _app-test.
        # Fehlt das Binary, failt der Step hart (statt nur zu warnen) — ein
        # stiller Skip hier hieße, dass die Architektur-Invariante in genau
        # dem Moment ungeprüft bleibt, in dem der Guard fehlt.
        run: |
          if [ -e node_modules/.bin/kumiko-guard-no-logic-in-views ]; then
            KUMIKO_GUARD_ROOTS=kumiko-framework bun kumiko-guard-no-logic-in-views
          else
            echo "::error::kumiko-guards ohne kumiko-guard-no-logic-in-views installiert — Dependency-Bump nachziehen"
            exit 1
          fi

      - name: Run tests
        run: |
          # watch-tests öffnen viele inotify-FDs; ohne Job-Container das
          # nofile-Limit selbst heben (kam vorher aus container.options).
          ulimit -n 65536 || true
          sh scripts/ci-memlog-run.sh bun kumiko check

      - name: Run isolated DOM screen tests (#457)
        # These render tests corrupt under the shared single-process happy-dom
        # after ~30 prior DOM test files mount/unmount — React event delegation
        # stops firing (#457). They are excluded from `kumiko check` above via
        # bunfig.ci.toml pathIgnorePatterns; `bun run test:dom-isolated` (704/2)
        # runs each in its own fresh `bun test` process via bunfig.ci-dom.toml
        # (which does NOT ignore them) — same script a local dev would find.
        run: |
          ulimit -n 65536 || true
          bun run test:dom-isolated

  tz-matrix:
    # Timezones epic (kumiko-framework#268), item 12. Runs the TZ-sensitive
    # tests under several non-UTC process zones, so a future process-TZ-dependent
    # regression (e.g. a stray `new Date(wallClock)`) fails HERE even though it
    # would pass in the UTC-based `test` job. Scoped to the time + DB-conversion
    # tests — that's where TZ bugs hide — so each leg is seconds, not the full
    # `kumiko check`. UTC itself is already covered by the `test` job.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        tz:
          - America/Los_Angeles
          - Europe/Berlin
          - Asia/Tokyo
          - Pacific/Apia # UTC+13/+14, date-line edge
    env:
      TZ: ${{ matrix.tz }}
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Cache Bun
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_PAT || secrets.GITHUB_TOKEN }}
        run: bun install --frozen-lockfile

      - name: Run TZ-sensitive tests
        run: bun test packages/framework/src/time/ packages/framework/src/db/__tests__/

  use-all-bundled-smoke:
    # C1 Sprint 9.8 Phase C, M4: canonical smoke-gate. Bootet
    # samples/apps/use-all-bundled mit KUMIKO_DRY_RUN_ENV=boot — alle
    # validators laufen, kein DB/Redis-Connect. Fängt feature-wiring-
    # Bugs (Object.entries(undefined), self-extension, missing-requires,
    # …) bevor sie publish + downstream-apps treffen.
    # Plan: kumiko-platform/docs/plans/features/use-all-features-smoke.md
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Cache Bun
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - name: Install
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_PAT || secrets.GITHUB_TOKEN }}
        run: bun install --frozen-lockfile
      - name: Verify generate.ts is idempotent
        # Re-run and assert kein Diff. Wenn jemand das schema.generated.ts
        # ändert ohne generate.ts re-runned zu haben → CI fail.
        run: |
          # Im Job-Container gehört der Workspace einer anderen uid als dem
          # run-Step-User → rohes git verweigert das Repo (dubious ownership →
          # "git diff --no-index"-Usage). Scoped auf genau diesen Workspace,
          # NICHT global safe.directory '*' im Image (Least-Privilege).
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          bun samples/apps/use-all-bundled/schema/generate.ts
          git diff --exit-code samples/apps/use-all-bundled/schema/schema.generated.ts
      - name: Coverage lint (M5)
        # Diffs bundled-features exports gegen FEATURE_IMPORT_REGISTRY +
        # known held-back. Fail wenn ein neuer feature-export ohne mount
        # oder ein stale registry-entry.
        run: bun samples/apps/use-all-bundled/scripts/check-coverage.ts

      - name: Schema check (Empfehlung 3)
        # kumiko-schema-check diff't mounted features (runtime) gegen
        # FEATURE_IMPORT_REGISTRY (statisch). Studio's 9.8-Drama:
        # registry 18 features hinter APP_FEATURES → migrations fehlten.
        run: bun packages/dev-server/bin/kumiko-schema-check.ts --run-config samples/apps/use-all-bundled/src/run-config.ts --generate samples/apps/use-all-bundled/schema/generate.ts

      - name: Boot smoke (no DB)
        # Stub-secrets: validators check Format (base64 32-byte, min-length),
        # nicht echte Crypto-Strength. boot-mode exitiert vor jedem
        # secret-decrypt-Pfad. Konstant gehalten für reproduzierbare runs.
        env:
          KUMIKO_DRY_RUN_ENV: boot
          DATABASE_URL: postgres://smoke:smoke@127.0.0.1:1/smoke
          REDIS_URL: redis://127.0.0.1:1
          JWT_SECRET: smokesmokesmokesmokesmokesmokesmokesmoke
          # Random 32-byte base64-encoded stub. Never used as real KEK —
          # boot-mode exits before any encrypt/decrypt path runs.
          KUMIKO_SECRETS_MASTER_KEY_V1: +7H+TnUa12nBRok5jVwyA7WdgjOJ0WqY3H9oBZ4M7UQ=
          # M0.1 subscription-stripe + subscription-mollie env-stubs.
          STRIPE_API_KEY: sk_test_smoke
          STRIPE_WEBHOOK_SECRET: whsec_smoke
          MOLLIE_API_KEY: test_smoke
        run: bun samples/apps/use-all-bundled/bin/main.ts

      - name: Bundle smoke (Empfehlung 4)
        # Builds use-all-bundled via kumiko-build, boots dist-server/server.js.
        # Catches bundling-only-bugs (minified Object.entries(undefined),
        # dynamic-require-resolution, tree-shake-quirks).
        env:
          KUMIKO_DRY_RUN_ENV: boot
          DATABASE_URL: postgres://smoke:smoke@127.0.0.1:1/smoke
          REDIS_URL: redis://127.0.0.1:1
          JWT_SECRET: smokesmokesmokesmokesmokesmokesmokesmoke
          KUMIKO_SECRETS_MASTER_KEY_V1: +7H+TnUa12nBRok5jVwyA7WdgjOJ0WqY3H9oBZ4M7UQ=
          STRIPE_API_KEY: sk_test_smoke
          STRIPE_WEBHOOK_SECRET: whsec_smoke
          MOLLIE_API_KEY: test_smoke
        run: bash samples/apps/use-all-bundled/scripts/bundle-smoke.sh

  # Non-blocking: nicht in release.needs, nicht in Branch-Protection → der
  # required `test`-Check bleibt unberührt. Fährt die ~213
  # *.integration.test.ts via scripts/run-integration-tests.ts (dir-by-dir,
  # concurrency=1) gegen den vollen Stack. Wall-clock perf gates laufen
  # separat via `test:integration:perf` (KUMIKO_PERF_GATE=1). test-setup/integration.preload.ts
  # setzt die localhost-Env-Defaults selbst (kein --env-file nötig).
  # cdgs-runner hat die docker-CLI aber kein compose-v2-Plugin → `docker run`
  # + user-defined Network, damit der minio-Bucket-Init minio per
  # Container-Name erreicht (wie es docker-compose.yml tat). Ersetzt den 2026
  # entfernten postgres-smoke-Job (war flaky vor dem bun-db-Cutover).
  integration:
    # GitHub-hosted: Services laufen via `docker run` (unten) → nativ auf ubuntu.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Cache Bun
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_PAT || secrets.GITHUB_TOKEN }}
        run: bun install --frozen-lockfile

      - name: Start services
        run: |
          docker network create kumiko-ci
          docker run -d --name kumiko-ci-pg --network kumiko-ci -p 15432:5432 \
            -e POSTGRES_USER=kumiko -e POSTGRES_PASSWORD=kumiko -e POSTGRES_DB=kumiko_dev \
            postgres:18.3-alpine
          docker run -d --name kumiko-ci-redis --network kumiko-ci -p 16379:6379 redis:7-alpine
          docker run -d --name kumiko-ci-meili --network kumiko-ci -p 17700:7700 \
            -e MEILI_MASTER_KEY=kumiko-dev-key -e MEILI_ENV=development \
            getmeili/meilisearch:v1.12
          docker run -d --name kumiko-ci-minio --network kumiko-ci -p 19000:9000 \
            -e MINIO_ROOT_USER=kumiko -e MINIO_ROOT_PASSWORD=kumiko-dev-secret \
            minio/minio:RELEASE.2025-01-20T14-49-07Z server /data
          for i in $(seq 1 30); do
            if docker exec kumiko-ci-pg pg_isready -U kumiko -d postgres >/dev/null 2>&1; then break; fi
            sleep 2
          done
          docker exec kumiko-ci-pg pg_isready -U kumiko -d postgres
          # bun-db tests connect directly to TEST_DATABASE_URL (kumiko_test);
          # docker-compose.yml seeds it via postgres-init, which a bare
          # `docker run` does not mount, so create it explicitly.
          docker exec kumiko-ci-pg psql -U kumiko -d kumiko_dev -c "CREATE DATABASE kumiko_test;"
          for i in $(seq 1 30); do
            if docker exec kumiko-ci-redis redis-cli ping >/dev/null 2>&1; then break; fi
            sleep 2
          done
          docker exec kumiko-ci-redis redis-cli ping
          for i in $(seq 1 30); do
            if docker exec kumiko-ci-meili wget -q --spider http://127.0.0.1:7700/health 2>/dev/null; then break; fi
            sleep 2
          done
          docker exec kumiko-ci-meili wget -q --spider http://127.0.0.1:7700/health
          for i in $(seq 1 30); do
            if docker run --rm --network kumiko-ci --entrypoint sh minio/mc:RELEASE.2025-01-17T23-25-50Z -c "mc alias set local http://kumiko-ci-minio:9000 kumiko kumiko-dev-secret && mc mb --ignore-existing local/kumiko-dev" >/dev/null 2>&1; then break; fi
            sleep 2
          done
          docker run --rm --network kumiko-ci --entrypoint sh minio/mc:RELEASE.2025-01-17T23-25-50Z -c "mc alias set local http://kumiko-ci-minio:9000 kumiko kumiko-dev-secret && mc ls local/kumiko-dev"

      - name: Run integration tests
        run: bun run test:integration

      # Split (441/1): only rebuildProjection's perf gate flakes under load
      # on shared runner hardware (~2k events/s on cdgs-runner vs ~14k
      # isolated) — that one stays advisory. Event-store latency + pipeline
      # perf don't share that hardware-contention profile and gate for real.
      - name: Run integration perf gates (event-store, pipeline — hard-blocking)
        run: bun run test:integration:perf:strict

      # Advisory — darf den integration-Job nicht rot färben. Bulk-Suite oben
      # ist das Signal.
      - name: Run integration perf gates (rebuildProjection — advisory, flaky under load)
        continue-on-error: true
        run: bun run test:integration:perf:flaky

      - name: Stop services
        if: always()
        run: |
          docker rm -f kumiko-ci-pg kumiko-ci-redis kumiko-ci-meili kumiko-ci-minio || true
          docker network rm kumiko-ci || true

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, use-all-bundled-smoke]
    # github-hosted: npm akzeptiert sigstore-provenance-attestations nur von
    # github-hosted runners (HTTP 422 sonst). Public Repo → alle Jobs github-
    # hosted (gratis); cdgs-runner wird hier nicht mehr genutzt.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - uses: actions/setup-node@v6
        with:
          node-version: "24.17.0"
          registry-url: "https://registry.npmjs.org"

      - name: Cache Bun
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_PAT || secrets.GITHUB_TOKEN }}
        run: bun install --frozen-lockfile

      # OIDC Trusted Publishing + Provenance via npm-CLI (bun pm publish kann
      # kein OIDC). scripts/publish-with-oidc.sh iteriert publishable
      # workspaces, ruft `npm publish --provenance --access public`.
      - uses: changesets/action@v1
        with:
          # changesets/action runs `version:` as a split argv (no shell), so an
          # inline `&& bun install` is passed as extra args to changeset and
          # fails ("Too many arguments"). The wrapper runs both in a real shell.
          # The `bun install` after the bump refreshes bun.lock's recorded
          # workspace versions so the version-PR commits a lock in sync with
          # package.json — publish-with-oidc.sh's `bun pm pack` substitutes
          # workspace:* from the lock, and a stale lock ships lagging internal
          # @cosmicdrift/* pins (#410, #520).
          version: bash scripts/changeset-version.sh
          publish: bash scripts/publish-with-oidc.sh
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          # PAT statt GITHUB_TOKEN: ein vom default-GITHUB_TOKEN erstellter PR
          # triggert per GitHub-Design keine Workflows (Recursion-Schutz). Die
          # Version-PR bliebe so dauerhaft BLOCKED, weil der required `test`-
          # Check nie läuft. Der PAT-Actor triggert die pull_request-Workflows.
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_PAT }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
