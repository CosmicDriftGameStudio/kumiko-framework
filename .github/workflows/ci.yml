# CI für kumiko-framework. Inline-Jobs (kein Cross-Repo-Reusable mehr) —
# das verhindert dass infra public sein muss damit dieses public-Repo
# seine Workflows ausführen kann.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    # `feat/**` covers stacked PRs (e.g. Sprint-9-style `feat/env-migration-core`
    # based on `feat/env-schemas`) — those used to silently skip CI.
    branches: [main, "feat/**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: cdgs-runner
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Cache TS Build Info
        uses: actions/cache@v4
        with:
          path: |
            **/*.tsbuildinfo
            **/dist
          key: tsbuildinfo-${{ runner.os }}-${{ hashFiles('**/bun.lock', '**/tsconfig.json') }}
          restore-keys: |
            tsbuildinfo-${{ runner.os }}-

      - name: Install
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_PAT || secrets.GITHUB_TOKEN }}
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun kumiko check

  use-all-bundled-smoke:
    # C1 Sprint 9.8 Phase C, M4: canonical smoke-gate. Bootet
    # samples/apps/use-all-bundled mit KUMIKO_DRY_RUN_ENV=boot — alle
    # validators laufen, kein DB/Redis-Connect. Fängt feature-wiring-
    # Bugs (Object.entries(undefined), self-extension, missing-requires,
    # …) bevor sie publish + downstream-apps treffen.
    # Plan: kumiko-platform/docs/plans/features/use-all-features-smoke.md
    runs-on: cdgs-runner
    needs: test
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Enable corepack
        run: corepack enable
      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: |
            ~/.yarn/cache
            ~/.yarn/berry/cache
            .yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-
      - name: Install
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_PAT || secrets.GITHUB_TOKEN }}
        run: bun install --frozen-lockfile
      - name: Verify drizzle/generate.ts is idempotent
        # Re-run and assert kein Diff. Wenn jemand das schema-generated.ts
        # ändert ohne generate.ts re-runned zu haben → CI fail.
        run: |
          bun samples/apps/use-all-bundled/drizzle/generate.ts
          git diff --exit-code samples/apps/use-all-bundled/drizzle/schema.generated.ts
      - name: Coverage lint (M5)
        # Diffs bundled-features exports gegen FEATURE_IMPORT_REGISTRY +
        # known held-back. Fail wenn ein neuer feature-export ohne mount
        # oder ein stale registry-entry.
        run: bun samples/apps/use-all-bundled/scripts/check-coverage.ts

      - name: Schema check (Empfehlung 3)
        # kumiko-schema-check diff't mounted features (runtime) gegen
        # FEATURE_IMPORT_REGISTRY (statisch). Studio's 9.8-Drama:
        # registry 18 features hinter APP_FEATURES → migrations fehlten.
        run: bun packages/dev-server/bin/kumiko-schema-check.ts --run-config samples/apps/use-all-bundled/src/run-config.ts --generate samples/apps/use-all-bundled/drizzle/generate.ts

      - name: Boot smoke (no DB)
        # Stub-secrets: validators check Format (base64 32-byte, min-length),
        # nicht echte Crypto-Strength. boot-mode exitiert vor jedem
        # secret-decrypt-Pfad. Konstant gehalten für reproduzierbare runs.
        env:
          KUMIKO_DRY_RUN_ENV: boot
          DATABASE_URL: postgres://smoke:smoke@127.0.0.1:1/smoke
          REDIS_URL: redis://127.0.0.1:1
          JWT_SECRET: smokesmokesmokesmokesmokesmokesmokesmoke
          # Random 32-byte base64-encoded stub. Never used as real KEK —
          # boot-mode exits before any encrypt/decrypt path runs.
          KUMIKO_SECRETS_MASTER_KEY_V1: +7H+TnUa12nBRok5jVwyA7WdgjOJ0WqY3H9oBZ4M7UQ=
          # M0.1 subscription-stripe + subscription-mollie env-stubs.
          STRIPE_API_KEY: sk_test_smoke
          STRIPE_WEBHOOK_SECRET: whsec_smoke
          MOLLIE_API_KEY: test_smoke
        run: bun samples/apps/use-all-bundled/bin/main.ts

      - name: Bundle smoke (Empfehlung 4)
        # Builds use-all-bundled via kumiko-build, boots dist-server/server.js.
        # Catches bundling-only-bugs (minified Object.entries(undefined),
        # dynamic-require-resolution, tree-shake-quirks).
        env:
          KUMIKO_DRY_RUN_ENV: boot
          DATABASE_URL: postgres://smoke:smoke@127.0.0.1:1/smoke
          REDIS_URL: redis://127.0.0.1:1
          JWT_SECRET: smokesmokesmokesmokesmokesmokesmokesmoke
          KUMIKO_SECRETS_MASTER_KEY_V1: +7H+TnUa12nBRok5jVwyA7WdgjOJ0WqY3H9oBZ4M7UQ=
          STRIPE_API_KEY: sk_test_smoke
          STRIPE_WEBHOOK_SECRET: whsec_smoke
          MOLLIE_API_KEY: test_smoke
        run: bash samples/apps/use-all-bundled/scripts/bundle-smoke.sh

  use-all-bundled-postgres-smoke:
    # C1 M3: echter boot bis /health gegen postgres + redis service-
    # containers. Apply drizzle migrations, spawn bun bin/main.ts, curl
    # /health. Pattern wie Studio's Deploy, gegen alle 30 bundled-features.
    runs-on: cdgs-runner
    needs: use-all-bundled-smoke
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: smoke
          POSTGRES_PASSWORD: smoke
          POSTGRES_DB: smoke
        options: >-
          --health-cmd "pg_isready -U smoke"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:8-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - name: Install
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_PAT || secrets.GITHUB_TOKEN }}
        run: bun install --frozen-lockfile
      - name: Postgres-smoke (migrate + boot + /health)
        env:
          DATABASE_URL: postgres://smoke:smoke@127.0.0.1:5432/smoke
          REDIS_URL: redis://127.0.0.1:6379
          JWT_SECRET: smokesmokesmokesmokesmokesmokesmokesmoke
          KUMIKO_SECRETS_MASTER_KEY_V1: +7H+TnUa12nBRok5jVwyA7WdgjOJ0WqY3H9oBZ4M7UQ=
          STRIPE_API_KEY: sk_test_smoke
          STRIPE_WEBHOOK_SECRET: whsec_smoke
          MOLLIE_API_KEY: test_smoke
          PORT: "3000"
        run: bash samples/apps/use-all-bundled/scripts/smoke-postgres.sh

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, use-all-bundled-smoke, use-all-bundled-postgres-smoke]
    # github-hosted, NICHT cdgs-runner: npm akzeptiert sigstore-provenance-
    # attestations nur von github-hosted runners (HTTP 422 sonst). Public
    # Repo → github-hosted free. Test-Job bleibt auf cdgs-runner (resources).
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_PAT || secrets.GITHUB_TOKEN }}
        run: bun install --frozen-lockfile

      # OIDC Trusted Publishing + Provenance via npm-CLI (yarn-berry kann
      # kein OIDC). scripts/publish-with-oidc.sh iteriert publishable
      # workspaces, ruft `npm publish --provenance --access public`.
      - uses: changesets/action@v1
        with:
          version: bunx changeset version
          publish: bash scripts/publish-with-oidc.sh
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
