# CI für kumiko-framework. Pattern: test + auto-publish via Changesets.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Full check: yarn kumiko check ruft alle 19 Guards via bunx
    # (kumiko-guard-X bin-entries aus @cosmicdriftgamestudio/kumiko-guards).
    # Standalone-CI-Detection in resolveRepoRoots() (siehe guards@0.1.2)
    # erkennt cwd-basename als single root — keine ENV-Override nötig.
    uses: cosmicdriftgamestudio/infra/.github/workflows/_test.yml@main
    with:
      test-command: "yarn kumiko check"
      enable-gh-packages: true
    secrets: inherit

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    # Caller-Permissions sind die Obergrenze für reusable workflows. Das
    # reusable braucht id-token:write für OIDC Trusted Publishing — wenn
    # der Caller das nicht grantet, scheitert die Workflow-Validation
    # vor dem ersten Step.
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    uses: cosmicdriftgamestudio/infra/.github/workflows/_npm-publish.yml@main
    secrets: inherit
