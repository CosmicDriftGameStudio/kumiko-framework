# CI für kumiko-framework. Pattern: test + auto-publish via Changesets.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Vorerst nur Vitest (yarn test:run) — yarn kumiko check ruft ../infra/guards/X.ts
    # was Sibling-Repo-Cross-Setup braucht. Pending: _test.yml mit multi-checkout
    # erweitern, dann test-command auf "yarn kumiko check" zurück.
    uses: cosmicdriftgamestudio/infra/.github/workflows/_test.yml@main
    with:
      test-command: "yarn test:run"
      enable-gh-packages: true
    secrets: inherit

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    uses: cosmicdriftgamestudio/infra/.github/workflows/_npm-publish.yml@main
    secrets: inherit
