# Local dev stack for `kumiko dev` and integration tests.
# Port defaults match test-setup/integration.preload.ts (high ports avoid
# clashing with system Postgres/Redis installs).

services:
  postgres:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_USER: kumiko
      POSTGRES_PASSWORD: kumiko
      POSTGRES_DB: kumiko_dev
    ports:
      - "${KUMIKO_PG_PORT:-15432}:5432"
    volumes:
      # PG18+ image: mount parent dir, not .../data (enables pg_upgrade on same volume).
      - postgres_data:/var/lib/postgresql
      # docker-entrypoint-initdb.d runs ONLY on a fresh (empty) volume. On an
      # already-populated postgres_data the kumiko_test database is NOT created,
      # so integration tests fail with "database \"kumiko_test\" does not exist".
      # Recover with one of:
      #   docker compose exec postgres createdb -U kumiko kumiko_test
      #   docker compose down -v && docker compose up -d   # recreates the volume
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kumiko -d kumiko_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${KUMIKO_REDIS_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.12
    environment:
      MEILI_MASTER_KEY: kumiko-dev-key
      MEILI_ENV: development
    ports:
      - "${KUMIKO_MEILI_PORT:-17700}:7700"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:7700/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: kumiko
      MINIO_ROOT_PASSWORD: kumiko-dev-secret
    ports:
      - "${KUMIKO_MINIO_PORT:-19000}:9000"
      - "${KUMIKO_MINIO_CONSOLE_PORT:-19001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot bucket bootstrap for S3 integration tests (files-provider-s3).
  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command: >
      -c "
      mc alias set local http://minio:9000 kumiko kumiko-dev-secret &&
      mc mb --ignore-existing local/kumiko-dev
      "
    restart: "no"

  # ── Local AI stack (opt-in `ai` profile; heavy — NOT started by a plain
  #    `docker compose up`). Bring up with:  docker compose --profile ai up -d
  #    Replaces standalone Ollama / Whisper installs so every dev gets the
  #    same local AI backend. Consumed by ai-provider-openai-compat (LLM) +
  #    transcribe-provider-openai-compat (STT) — point their `endpoint`
  #    config at the host ports below. ────────────────────────────────────

  # LLM — OpenAI-compatible at http://localhost:11434/v1.
  # Pull a model once: `docker compose exec ollama ollama pull qwen2.5:7b`
  # (good tool-use + German; needed by ai-triage / ai-draft).
  ollama:
    image: ollama/ollama:latest
    profiles: ["ai"]
    ports:
      - "${KUMIKO_OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # One-shot: pull a default model so the LLM works out of the box (no manual
  # `ollama pull`). The pull is server-side (into ollama_data). Override with
  # KUMIKO_OLLAMA_MODEL=llama3.1:8b etc.
  ollama-init:
    image: ollama/ollama:latest
    profiles: ["ai"]
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: "http://ollama:11434"
    entrypoint: /bin/sh
    command: >
      -c "ollama pull ${KUMIKO_OLLAMA_MODEL:-qwen2.5:7b}"
    restart: "no"

  # STT — OpenAI-compatible /v1/audio/transcriptions at http://localhost:9000/v1.
  # Default model is UNGATED → downloads on first request (no HF token needed),
  # cached in the named volume. For HF-blocked networks, pre-download once:
  #   hf download deepdml/faster-whisper-large-v3-turbo-ct2 --local-dir ~/kumiko-whisper-de
  # then set KUMIKO_WHISPER_MODEL=/models/de and bind-mount ~/kumiko-whisper-de
  # to /models/de via a docker-compose.override.yml.
  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    profiles: ["ai"]
    ports:
      - "${KUMIKO_WHISPER_PORT:-9000}:8000"
    environment:
      WHISPER__MODEL: "${KUMIKO_WHISPER_MODEL:-deepdml/faster-whisper-large-v3-turbo-ct2}"
      WHISPER__INFERENCE_DEVICE: cpu
    volumes:
      - whisper_cache:/root/.cache/huggingface
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - import urllib.request; urllib.request.urlopen("http://localhost:8000/health")
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s

volumes:
  postgres_data:
  redis_data:
  meili_data:
  minio_data:
  ollama_data:
  whisper_cache:
