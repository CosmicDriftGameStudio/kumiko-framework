[install]
linker = "hoisted"

[install.scopes]
"@cosmicdriftgamestudio" = { url = "https://npm.pkg.github.com", token = "$GITHUB_TOKEN" }

[test]
# Unit-test default: polyfill-only preload (no service-URL env, no DOM).
# Integration runs pull service defaults via bunfig.integration.toml →
# integration.preload.ts. DOM/render tests (*.test.tsx) laufen über
# bunfig.dom.toml (Issue #1330) — hier wird happy-dom nicht mehr geladen.
# CI: concurrency=1 — single-CPU cdgs-runner. Local dev keeps concurrency=8
# in bunfig.toml.
preload = [
  "./test-setup/ci-log.preload.ts",
  "./test-setup/base.preload.ts",
]
concurrency = 1

# lcov für Codecov-Upload (README-Badge). Kein coverageThreshold gesetzt —
# der defaultet pro Metrik auf 100% und würde den Run failen.
coverage = true
coverageReporter = ["lcov"]
coverageDir = "coverage/unit"
# **/scripts/** + **/bin/** exclude CLI tooling with no product coverage;
# test-setup/ and integration.guard.ts are test infrastructure, not product code.
coveragePathIgnorePatterns = [
  "**/scripts/**",
  "**/bin/**",
  "**/test-setup/**",
  "integration.guard.ts",
]

# *.spec.ts gehören zu Playwright (e2e/-Folder). bun test versucht sonst
# sie zu loaden und crash't weil Playwright eigene test()-Globals erwartet
# (siehe "Playwright Test did not expect test() to be called here").
pathIgnorePatterns = [
  "**/*.integration.test.ts",
  "**/*.integration.ts",
  # *.test.tsx brauchen happy-dom → eigener CI-Step via bunfig.dom.toml
  # (`bun run test:dom`), siehe bin/kumiko-legacy.ts "DOM Tests" step.
  "**/*.test.tsx",
  "**/e2e/**",
  "**/*.spec.ts",
  "**/*.spec.tsx",
  # dist/ enthält compiled .js mit denselben Test-Namen wie src/ —
  # ohne Exclude scant bun test BEIDE Kopien (duplicates kämpfen um
  # ephemerale DBs, sieht aus wie flaky-Tests).
  "**/dist/**",
]

